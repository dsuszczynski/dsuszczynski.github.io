# Site settings
title: Daniel Suszczynski
description: Engineering leader with 20+ years in fintech and SaaS. Open to permanent, fractional, and interim engagements. Based in Berlin, available EU-wide.
url: "https://suszczynski.dev"
baseurl: ""

# Author
author:
  name: Daniel Suszczynski
  email: daniel@suszczynski.dev
  linkedin: suszczynski
  github: dsuszczynski
  location: Berlin, Germany

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
future: true

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:slug/
  case_studies:
    output: true
    permalink: /case-studies/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
  - scope:
      path: ""
      type: "case_studies"
    values:
      layout: "case-study"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Include hidden folders
include:
  - .well-known
